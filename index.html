<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MBE Albania SmartChoice</title>
    <meta name="description" content="MBE Albania shipping service comparison tool" />
    <style>
      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      body { margin: 0; font-family: Ubuntu, Arial, sans-serif; background: #f8fafc; color: #111827; }
      input, button, textarea, select { font: inherit; }
      button { touch-action: manipulation; }
      #root { min-height: 100vh; }
      summary::-webkit-details-marker { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const updateMbeDescription = () => {
        document.querySelectorAll("div, p, span").forEach((element) => {
          if (element.textContent?.trim() === "Mail Boxes Etc. Albania") {
            element.textContent = "MBE Albania";
          }
        });
      };

      new MutationObserver(updateMbeDescription).observe(document.documentElement, {
        childList: true,
        subtree: true,
        characterData: true,
      });

      updateMbeDescription();
    </script>
  </body>
</html>
