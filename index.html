<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MBE Albania SmartChoice</title>
    <meta name="description" content="MBE Albania shipping service comparison tool" />
    <style>
      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      body { margin: 0; font-family: Ubuntu, Arial, sans-serif; background: #f8fafc; color: #111827; }
      input, button, textarea, select { font: inherit; }
      button { touch-action: manipulation; }
      #root { min-height: 100vh; }
      summary::-webkit-details-marker { display: none; }

      .smart-country-wrap {
        position: relative;
        width: 100%;
      }
      .smart-country-button {
        width: 100%;
        min-height: 50px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px;
        border: 1px solid #d0d7de;
        border-radius: 12px;
        background: #fff;
        color: #111827;
        cursor: pointer;
        text-align: left;
      }
      .smart-country-button:hover {
        border-color: #94a3b8;
      }
      .smart-country-button:focus-visible {
        outline: 3px solid rgba(37, 99, 235, .18);
        border-color: #2563eb;
      }
      .smart-country-flag {
        width: 24px;
        height: 18px;
        flex: 0 0 24px;
        object-fit: cover;
        border-radius: 2px;
        box-shadow: 0 0 0 1px rgba(15, 23, 42, .14);
      }
      .smart-country-name {
        flex: 1;
        min-width: 0;
        font-size: 17px;
      }
      .smart-country-arrow {
        color: #64748b;
        font-size: 13px;
      }
      .smart-country-menu {
        position: absolute;
        z-index: 1000;
        left: 0;
        right: 0;
        top: calc(100% + 6px);
        max-height: 320px;
        overflow-y: auto;
        padding: 6px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 18px 40px rgba(15, 23, 42, .18);
      }
      .smart-country-menu[hidden] { display: none; }
      .smart-country-option {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border: 0;
        border-radius: 9px;
        background: #fff;
        color: #111827;
        cursor: pointer;
        text-align: left;
      }
      .smart-country-option:hover,
      .smart-country-option[aria-selected="true"] {
        background: #eff6ff;
      }
      .smart-country-option[aria-selected="true"] {
        color: #1d4ed8;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      const nativeArrayFilter = Array.prototype.filter;

      Array.prototype.filter = function (callback, thisArg) {
        const filtered = nativeArrayFilter.call(this, callback, thisArg);
        const containsShippingResults = filtered.some(
          (item) => item && typeof item === "object" && "serviceType" in item && "name" in item,
        );

        if (!containsShippingResults) return filtered;
        return nativeArrayFilter.call(filtered, (item) => item?.name !== "UPS Standard");
      };

      const cleanCountryLabel = (option) => {
        const raw = (option.textContent || option.value || "").trim();
        return raw
          .replace(/^\p{Regional_Indicator}{2}\s+/u, "")
          .replace(/^[A-Z]{2}\s+/, "")
          .trim();
      };

      const flagUrl = (code) => `https://flagcdn.com/24x18/${code.toLowerCase()}.png`;

      const syncCountryDropdown = (select, wrapper) => {
        const button = wrapper.querySelector(".smart-country-button");
        const menu = wrapper.querySelector(".smart-country-menu");
        const options = Array.from(select.options);
        const selected = options.find((option) => option.value === select.value) || options[0];

        if (!button || !menu || !selected) return;

        const selectedLabel = cleanCountryLabel(selected);
        button.innerHTML = `
          <img class="smart-country-flag" src="${flagUrl(selected.value)}" alt="${selected.value}" />
          <span class="smart-country-name">${selectedLabel}</span>
          <span class="smart-country-arrow" aria-hidden="true">▾</span>
        `;

        const signature = options.map((option) => `${option.value}:${cleanCountryLabel(option)}`).join("|");
        if (menu.dataset.signature === signature && menu.dataset.selected === select.value) return;

        menu.dataset.signature = signature;
        menu.dataset.selected = select.value;
        menu.replaceChildren();

        options.forEach((option) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "smart-country-option";
          item.setAttribute("role", "option");
          item.setAttribute("aria-selected", String(option.value === select.value));
          item.innerHTML = `
            <img class="smart-country-flag" src="${flagUrl(option.value)}" alt="${option.value}" />
            <span class="smart-country-name">${cleanCountryLabel(option)}</span>
          `;

          item.addEventListener("click", () => {
            select.value = option.value;
            select.dispatchEvent(new Event("change", { bubbles: true }));
            menu.hidden = true;
            button.setAttribute("aria-expanded", "false");
            queueMicrotask(() => syncCountryDropdown(select, wrapper));
          });

          menu.appendChild(item);
        });
      };

      const enhanceCountryDropdown = () => {
        document.querySelectorAll("select").forEach((select) => {
          if (select.dataset.smartCountry === "true") {
            const wrapper = select.parentElement?.querySelector(":scope > .smart-country-wrap");
            if (wrapper) syncCountryDropdown(select, wrapper);
            return;
          }

          select.dataset.smartCountry = "true";
          select.style.display = "none";

          const wrapper = document.createElement("div");
          wrapper.className = "smart-country-wrap";

          const button = document.createElement("button");
          button.type = "button";
          button.className = "smart-country-button";
          button.setAttribute("aria-haspopup", "listbox");
          button.setAttribute("aria-expanded", "false");

          const menu = document.createElement("div");
          menu.className = "smart-country-menu";
          menu.setAttribute("role", "listbox");
          menu.hidden = true;

          button.addEventListener("click", (event) => {
            event.stopPropagation();
            const nextOpen = menu.hidden;
            document.querySelectorAll(".smart-country-menu").forEach((other) => {
              if (other !== menu) other.hidden = true;
            });
            menu.hidden = !nextOpen;
            button.setAttribute("aria-expanded", String(nextOpen));
          });

          menu.addEventListener("click", (event) => event.stopPropagation());

          wrapper.append(button, menu);
          select.insertAdjacentElement("afterend", wrapper);
          syncCountryDropdown(select, wrapper);
        });
      };

      document.addEventListener("click", () => {
        document.querySelectorAll(".smart-country-menu").forEach((menu) => {
          menu.hidden = true;
          const button = menu.parentElement?.querySelector(".smart-country-button");
          button?.setAttribute("aria-expanded", "false");
        });
      });

      const updateSmartChoiceUi = () => {
        document.querySelectorAll("div, p, span").forEach((element) => {
          if (element.textContent?.trim() === "Mail Boxes Etc. Albania") {
            element.textContent = "MBE Albania";
          }
        });

        document.querySelectorAll("details").forEach((section) => {
          const summary = section.querySelector(":scope > summary");
          const label = summary?.textContent?.toLowerCase() ?? "";

          if (label.includes("economy")) {
            section.style.background = "#f0fdf4";
            section.style.border = "1px solid #bbf7d0";
            section.style.boxShadow = "0 1px 2px rgba(22,163,74,.06)";
            if (summary instanceof HTMLElement) summary.style.color = "#166534";
          }

          if (label.includes("express")) {
            section.style.background = "#fff1f2";
            section.style.border = "1px solid #fecdd3";
            section.style.boxShadow = "0 1px 2px rgba(220,38,38,.06)";
            if (summary instanceof HTMLElement) summary.style.color = "#9f1239";
          }
        });

        enhanceCountryDropdown();
      };

      new MutationObserver(updateSmartChoiceUi).observe(document.documentElement, {
        childList: true,
        subtree: true,
        characterData: true,
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      updateSmartChoiceUi();
    </script>
  </body>
</html>
