name: Build DHL remote database

on:
  workflow_dispatch:
  push:
    branches:
      - dhl-remote-live
    paths:
      - scripts/build_dhl_remote.py
      - .github/workflows/build-dhl-remote.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dhl-remote-live
      - name: Install PDF tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Build database
        run: python scripts/build_dhl_remote.py
      - name: Commit database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/dhl-remote-2026.bin.gz
          git diff --cached --quiet || git commit -m "Build DHL 2026 remote database"
          git push origin HEAD:dhl-remote-live
