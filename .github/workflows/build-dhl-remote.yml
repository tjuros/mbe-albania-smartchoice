name: Build DHL remote database

on:
  workflow_dispatch:
  push:
    branches:
      - dhl-remote-live
    paths:
      - src/remoteData/part4.ts
      - .github/workflows/build-dhl-remote.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dhl-remote-live
      - name: Install PDF tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Download official DHL 2026 list
        run: |
          curl -L --retry 3 --fail --user-agent "Mozilla/5.0" \
            "https://mydhl.express.dhl/content/dam/downloads/g0/remote-areas/dhl_express_remote_areas_en.pdf.coredownload.pdf" \
            -o /tmp/dhl-remote.pdf
      - name: Build database
        run: |
          base64 --decode src/remoteData/part4.ts > /tmp/build_dhl_remote.py
          python /tmp/build_dhl_remote.py /tmp/dhl-remote.pdf
      - name: Commit database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/dhl-remote-2026.bin.gz
          git diff --cached --quiet || git commit -m "Build DHL 2026 remote database"
          git push origin HEAD:dhl-remote-live
